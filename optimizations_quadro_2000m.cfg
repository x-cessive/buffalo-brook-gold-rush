# Buffalo Brook Gold Rush - Optimization Configuration for NVIDIA Quadro 2000M
# Based on Fermi architecture (2GB VRAM, circa 2010)
#
# This configuration file outlines all optimizations needed for older GPUs

## PHYSICS OPTIMIZATIONS ##

# Physics Engine Settings
[physics]

# FPS Settings (Lower values for better performance on older hardware)
fps = 30
fixed_fps = 60

# 3D Physics Parameters
[physics/3d]

# Time-step settings
default_step = 0.033  # 1/30 seconds
max_substeps = 1

# Penetration resolution
bounce_threshold_velocity = 2.0  # Higher = less processing
contact_max_separation = 0.3      # Higher = less processing
contact_max_allowed_penetration = 0.15  # Higher = less processing

# Solver parameters
solver_iterations_vel = 4         # Lower = faster but less accurate
solver_iterations_pos = 2         # Lower = faster but less accurate
solver_bias = 0.8                 # Higher = less processing
max_penetration_bias = 0.2        # Higher = less processing

# Contacts reporting
contacts_precision_threshold = 0.01
max_contacts_reported = 16        # Reduced from default 64

# CCD (Continuous Collision Detection) - Disable if not essential
ccd_max_iterations = 2            # Lower = faster
default_contact_monitor_callback = false

# 2D Physics Parameters
[physics/2d]

# Time-step settings
default_step = 0.033  # 1/30 seconds
max_substeps = 1

# Iteration counts (reduced from defaults)
iterations = 4                    # From default 8
collision_iterations = 2          # Lower = faster

# Solver parameters
velocity_iterations = 4           # Lower = faster
position_iterations = 2           # Lower = faster
collision_bias = 0.8              # Higher = faster

# Velocity thresholds
bounce_threshold_velocity = 2.0   # Higher = less processing
motion_fix_enabled = false        # Disable for speed

## RENDERING OPTIMIZATIONS ##

# Rendering General
[rendering]

# Quality settings
quality/texture_filter_quality = 1      # Medium quality
quality/use_pixel_snap = false          # Disable to save processing
quality/anti_aliasing = 0               # No AA (very expensive on older GPUs)
quality/shadow_filter = 0               # Coarse shadows

# Buffer settings
quality/buffer_use_half_float = true    # Save memory
quality/buffer_use_framebuffers = false # Older GPU compatibility
quality/buffer_fsr = false
quality/buffer_fsr_sharpness = 0.0

# Depth buffer optimization
quality/depth_buffer/use_24_bit_depth = false  # Use 16-bit where possible
quality/depth_buffer/prefer_compression = true

# Multisample Anti-aliasing (DISABLED)
quality/msaa_mode = 0

# Lighting settings
quality/lights_cluster_bin_size = 1024  # Lower to reduce processing
quality/max_lights_per_cell = 4        # Reduce from default 8
quality/max_reflections_per_cell = 2   # Reduce from default 4
quality/max_shadow_atlas_subdiv = 2    # Lower = less processing

# Environment settings
quality/reflection_atlas_subdiv = 0    # Minimal reflections
quality/reflection_atlas_size = 256    # Small reflection textures
quality/ssao_quality = 0               # Disabled
quality/ssil_quality = 0               # Disabled
quality/subsurface_scattering_quality = 0  # Disabled
quality/screen_space_aa = 0            # Disabled

# Voxel GI (Global Illumination)
quality/voxel_cone_tracing = false     # Disabled

# Shadow settings
quality/directional_shadow/size = 512  # Smaller shadows = faster
quality/directional_shadow/depth_range = 0  # Optimized range
quality/max_shadow_parallel_splits = 2 # Fewer splits = faster

# Volumetric fog
quality/volumetric_fog = false         # Disabled

## PARTICLE SYSTEM LIMITATIONS ##

# GPUParticles2D and GPUParticles3D Settings
[rendering/quality/particles]

# Reduce complexity for older hardware
use_gpu_particles = false              # Use CPU particles instead
cp_particles_use_local_coordinates = true

# Limit particle counts significantly for older hardware
max_particles_per_emitter = 100        # Very conservative for Quadro 2000M

## TEXTURE COMPRESSION ##

# Texture import settings
[rendering/textures]

# For Fermi architecture compatibility
compression/texture_format = 1         # S3TC/DXT1/DXT5
compression/normal_map_format = 0      # RGTC
compression/srgb_format = 1            # Keep sRGB but compress

# Memory optimization
compress/enable = true                 # Always compress on older hardware
compress/lossy_quality = 0.70          # Good balance of quality and size
compress/hdr_compression = 1           # BC6H for HDR textures

# Mipmap optimization
mipmaps/generate = false               # Generate only when necessary
mipmaps/keep = false                   # Don't keep source data

## MEMORY MANAGEMENT ##

# Memory optimization settings
[memory]

# VRAM conservation
max_cache_size = 128                   # Limit to 128MB cache (VRAM conservative)
max_cache_size_kb = 131072             # In kilobytes

# Pool arrays optimization
pool_max_size_warning = 1000000        # Lower warning threshold

## SCENE MANAGER ##

# Scene optimization
[scene]

# Reduce processing overhead
render_loop/single_frame_thread_model = false  # Legacy threading
render_loop/use_multithreading = false         # Disable for older GPU stability

# Node processing
verbose_stdout = false                 # Reduce console output
debug_collisions_hint = false          # Disable debug draws
debug_navigation_hint = false          # Disable navigation debugging

## VIEWPORT SETTINGS ##

# Viewport optimization
[display]

# Screen and window settings
window/stretch/mode = "disabled"       # No stretch if possible
window/stretch/aspect = "keep"         # Preserve aspect ratio
window/video_driver = "GLES3"          # Use GLES3 for compatibility

# V-Sync settings
vsync/vsync_mode = 0                   # Disabled for performance, use engine if needed

## SHADER OPTIMIZATIONS ##

# For custom shaders in the game
[rendering/shaders]

# Reduce shader processing load
compile_shader_queues = 1              # Compile fewer at once
max_simultaneous_compiled_shaders = 1  # Conservative compilation


## GAME-SPECIFIC LIMITATIONS ##

# For Gold Panning Simulation
[gold_panning_simulation]

# Water effects limitation
water_particles_max = 50               # Conserve GPU particles
water_resolution_divisor = 2           # Lower resolution water effects

# Gold sparkles limitation  
gold_sparkles_max = 15                 # Limit sparkle particles
gold_sparkle_lifetime = 1.0            # Shorter duration

# UI particle effects
ui_particles_max = 5                   # Minimal UI particles

# Audio spatialization
max_audio_channels = 16                # Limit audio channels for CPU conservation

# Object pooling limits
max_poolable_objects = 50              # Limit pooled objects
max_interactable_objects = 25          # Limit simultaneous interactables

## DEBUGGING SETTINGS ##

# Profiling and debugging tools (disable in release builds)
[debug]

# FPS limiting
frame_delay = 0                        # No artificial delay
time_scale = 1.0                       # Normal time scaling

# Debug info
show_fps = true                        # Monitor performance
show_render_stats = false              # Disable unless debugging

# Memory debugging
enable_memory_debugging = false        # Disable for performance